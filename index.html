<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Справочник дизайнера — References</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="references.css" />

  <style>
    /* tokens aligned with ksu/css/tokens.css (портфолио-источник) */
    :root {
      --bg: #0A0A0A;
      --surface: rgba(255, 255, 255, 0.06);
      --surface-2: rgba(255, 255, 255, 0.10);
      --card-bg: rgba(255, 255, 255, 0.03);
      --border: rgba(255, 255, 255, 0.04);
      --text: #F5F5F5;
      --text-secondary: rgba(255, 255, 255, 0.7);
      --text-muted: rgba(255, 255, 255, 0.3);
      --accent: #FF2D55;
      --gap: 24px;
    }
    [data-theme="light"] {
      --bg: #F5F0EB;
      --surface: rgba(0, 0, 0, 0.05);
      --surface-2: rgba(0, 0, 0, 0.09);
      --card-bg: rgba(0, 0, 0, 0.04);
      --border: rgba(0, 0, 0, 0.10);
      --text: #1A1A1A;
      --text-secondary: rgba(0, 0, 0, 0.78);
      --text-muted: rgba(0, 0, 0, 0.5);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      transition: background 0.3s ease, color 0.3s ease;
    }

    .topbar {
      max-width: 1440px;
      margin: 0 auto;
      padding: 24px 40px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .topbar__brand {
      font-family: 'Unbounded', sans-serif;
      font-weight: 800;
      font-size: 18px;
      letter-spacing: -0.02em;
    }
    .controls { display: flex; gap: 8px; }
    .controls button {
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 600;
      padding: 8px 14px;
      border-radius: 8px;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      transition: all 0.2s ease;
    }
    .controls button:hover { background: var(--surface-2); }
    .controls button[aria-pressed="true"] { background: var(--text); color: var(--bg); }

    .references__label {
      font-family: 'Unbounded', sans-serif;
      font-weight: 700;
      font-size: clamp(28px, 5vw, 44px);
      letter-spacing: -0.03em;
      margin: 0 0 10px;
    }

    .ref-filterbar {
      max-width: 1440px;
      margin: 0 auto 28px;
    }
    .ref-filter {
      width: 100%;
      max-width: 360px;
      padding: 12px 16px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s ease;
    }
    .ref-filter:focus { border-color: var(--text-secondary); }
    .ref-filter::placeholder { color: var(--text-muted); }

    .ref-card { position: relative; }
    .ref-card__select {
      position: absolute;
      top: 10px; right: 10px;
      z-index: 2;
      width: 30px; height: 30px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 16px; line-height: 1;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s ease;
    }
    .ref-card__select:hover { color: var(--text); border-color: var(--text-secondary); }
    .ref-card.is-selected { outline: 2px solid var(--accent); outline-offset: 2px; }
    .ref-card.is-selected .ref-card__select { background: var(--accent); color: #fff; border-color: var(--accent); }

    .share-bar {
      position: fixed; left: 50%; bottom: 22px; transform: translateX(-50%);
      display: flex; align-items: center; gap: 10px;
      background: var(--surface); border: 1px solid var(--border);
      padding: 10px 14px; border-radius: 14px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.35); z-index: 50;
      font-size: 14px;
    }
    .share-bar__count { font-weight: 600; }
    .share-bar__btn {
      font-family: 'Inter', sans-serif; font-weight: 600; font-size: 13px;
      padding: 8px 14px; border-radius: 9px; cursor: pointer;
      border: 1px solid var(--border); background: var(--text); color: var(--bg);
    }
    .share-bar__btn--ghost { background: transparent; color: var(--text); }
    .share-bar__btn:hover { opacity: 0.88; }

    .share-banner {
      position: fixed; top: 0; left: 0; right: 0; z-index: 60;
      display: flex; align-items: center; justify-content: center; gap: 14px;
      padding: 10px 16px; background: var(--text); color: var(--bg);
      font-size: 14px; font-weight: 600;
    }
    .share-banner__btn {
      font-family: 'Inter', sans-serif; font-weight: 600; font-size: 13px;
      padding: 6px 12px; border-radius: 8px; cursor: pointer;
      border: 1px solid var(--bg); background: transparent; color: var(--bg);
    }

    .toast {
      position: fixed; left: 50%; bottom: 80px; transform: translateX(-50%);
      background: var(--text); color: var(--bg);
      padding: 10px 16px; border-radius: 10px; font-size: 14px; font-weight: 600;
      z-index: 70; box-shadow: 0 8px 30px rgba(0,0,0,0.35);
    }

    body.shared-mode .ref-card__select { display: none; }
    body.shared-mode .share-bar { display: none !important; }
    [hidden] { display: none !important; }

    .cat-bar { max-width: 1440px; margin: 0 auto 18px; display: flex; flex-wrap: wrap; gap: 8px; }
    .cat-chip {
      font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600;
      padding: 7px 14px; border-radius: 999px; cursor: pointer;
      border: 1px solid var(--border); background: var(--surface); color: var(--text);
      transition: all 0.2s ease;
    }
    .cat-chip:hover { background: var(--surface-2); }
    .cat-chip[aria-pressed="true"] { background: var(--text); color: var(--bg); border-color: var(--text); }
    body.shared-mode .cat-bar { display: none; }

    .platform-bar { max-width: 1440px; margin: 0 auto 12px; display: flex; flex-wrap: wrap; gap: 8px; }
    .plat-chip {
      font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600;
      padding: 6px 13px; border-radius: 999px; cursor: pointer;
      border: 1px solid var(--border); background: var(--surface); color: var(--text);
      transition: all 0.2s ease;
    }
    .plat-chip:hover { background: var(--surface-2); }
    .plat-chip[aria-pressed="true"] { background: var(--accent); color: #fff; border-color: var(--accent); }
    .plat-chip:focus-visible, .cat-chip:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    .ref-result { max-width: 1440px; margin: 0 auto 10px; color: var(--text-muted); font-size: 13px; }
    body.shared-mode .platform-bar { display: none; }

    /* === Режим презентации (Б) === */
    body.present-mode { overflow: hidden; }
    .present-overlay {
      position: fixed; inset: 0; z-index: 4000;
      background: var(--overlay-dark, rgba(0,0,0,0.92));
      color: var(--text);
      display: flex; flex-direction: column;
      padding: 24px; opacity: 0; pointer-events: none;
      transition: opacity 0.25s ease;
    }
    .present-overlay.is-open { opacity: 1; pointer-events: auto; }
    .present-top {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 16px;
    }
    .present-counter {
      font-family: 'Unbounded', sans-serif; font-weight: 700;
      font-size: 15px; letter-spacing: -0.01em;
    }
    .present-counter b { color: var(--accent); }
    .present-hint {
      font-size: 12px; color: var(--text-secondary); text-align: right;
      line-height: 1.5; opacity: 0.8; transition: opacity 0.4s ease;
    }
    .present-overlay.hide-hint .present-hint { opacity: 0; }
    .present-close {
      flex: none; width: 38px; height: 38px; border-radius: 50%;
      border: 1px solid var(--border); background: var(--surface);
      color: var(--text); font-size: 18px; line-height: 1; cursor: pointer;
      transition: all 0.2s ease;
    }
    .present-close:hover { background: var(--surface-2); }
    .present-stage {
      flex: 1; display: flex; align-items: center; justify-content: center;
      min-height: 0; padding: 24px 0;
    }
    .present-slide {
      width: min(880px, 100%); max-height: 100%;
      border: 1px solid var(--border); border-radius: 16px; overflow: hidden;
      background: var(--card-bg); display: flex; flex-direction: column;
    }
    .present-slide__inner {
      padding: 40px 44px; display: flex; flex-direction: column;
      min-height: 240px; gap: 16px;
      background: linear-gradient(135deg, var(--slide-from, #FF2D5522), var(--slide-to, #FF2D5508));
    }
    .present-slide__cat {
      font-family: 'Unbounded', sans-serif; font-weight: 700;
      font-size: clamp(24px, 4vw, 40px); letter-spacing: -0.02em;
    }
    .present-slide__desc { font-size: 15px; line-height: 1.6; color: var(--text-secondary); }
    .present-slide__links { display: flex; flex-wrap: wrap; gap: 8px; margin-top: auto; }
    .present-slide__links a {
      flex: 1; min-width: 90px; text-align: center;
      padding: 12px 10px; border-radius: 8px; text-decoration: none;
      font-size: 13px; font-weight: 600;
      background: rgba(255,255,255,0.06); color: var(--text);
      transition: filter 0.2s ease;
    }
    .present-slide__links a:hover { filter: brightness(1.25); }
    .present-nav {
      display: flex; align-items: center; justify-content: center; gap: 14px;
      padding-top: 8px;
    }
    .present-nav button {
      width: 46px; height: 46px; border-radius: 50%; cursor: pointer;
      border: 1px solid var(--border); background: var(--surface); color: var(--text);
      font-size: 18px; line-height: 1; transition: all 0.2s ease;
    }
    .present-nav button:hover { background: var(--surface-2); }
    .present-nav button:disabled { opacity: 0.3; cursor: default; }

    /* === Доступность: видимый фокус для клавиатуры === */
    :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    .ref-filter:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    .ref-card__link:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar__brand">Справочник дизайнера</div>
    <div class="controls">
      <button id="lang-ru" type="button" onclick="setLang('ru')">RU</button>
      <button id="lang-en" type="button" onclick="setLang('en')">EN</button>
      <button id="theme-toggle" type="button" onclick="toggleTheme()" aria-label="Переключить тему">☾ / ☀</button>
    </div>
  </header>

  <main class="references">
    <div class="references__header">
      <h1 class="references__label" id="refs-label"></h1>
      <p class="references__subtitle" id="refs-subtitle"></p>
    </div>

    <div class="ref-filterbar">
      <input id="ref-filter" class="ref-filter" type="search" placeholder="Поиск по направлениям…" />
    </div>

    <div class="cat-bar" id="cat-bar"></div>
    <div class="platform-bar" id="platform-bar"></div>
    <p class="ref-result" id="ref-result" aria-live="polite"></p>

    <div class="references__grid" id="references-grid"></div>

    <section class="ref-section">
      <h2 class="ref-section__title" id="special-title"></h2>
      <p class="ref-section__desc" id="special-desc"></p>
      <div class="ref-section__grid ref-section__grid--special" id="special-grid"></div>
    </section>

    <section class="ref-section">
      <h2 class="ref-section__title" id="boards-title"></h2>
      <p class="ref-section__desc" id="boards-desc"></p>
      <div class="ref-section__grid ref-section__grid--boards" id="boards-grid"></div>
    </section>
  </main>

  <div class="share-banner" id="share-banner" hidden>
    <span id="share-banner-text"></span>
    <button type="button" id="share-view-all" class="share-banner__btn">Смотреть всё</button>
  </div>

  <div class="share-bar" id="share-bar" hidden>
    <span class="share-bar__count" id="share-count"></span>
    <button type="button" id="share-copy" class="share-bar__btn">Копировать ссылку</button>
    <button type="button" id="share-md" class="share-bar__btn share-bar__btn--ghost">Список</button>
    <button type="button" id="share-present" class="share-bar__btn share-bar__btn--ghost">Презентация</button>
    <button type="button" id="share-clear" class="share-bar__btn share-bar__btn--ghost">Очистить</button>
  </div>

  <div class="toast" id="toast" hidden></div>

  <div class="present-overlay" id="present-overlay" hidden>
    <div class="present-top">
      <div class="present-counter" id="present-counter"></div>
      <div class="present-hint">← → — листать · Esc — выйти</div>
      <button type="button" id="present-close" class="present-close" aria-label="Закрыть презентацию">✕</button>
    </div>
    <div class="present-stage" id="present-stage"></div>
    <div class="present-nav">
      <button type="button" id="present-prev" aria-label="Назад">←</button>
      <button type="button" id="present-next" aria-label="Вперёд">→</button>
    </div>
  </div>

  <script src="references.js"></script>
  <script>
    // Глобальная переменная `lang`, которую ожидают функции из references.js
    let lang = 'ru';
    // Восстанавливаем язык и тему из прошлой сессии (localStorage)
    try {
      const savedLang = localStorage.getItem('references:lang');
      if (savedLang === 'ru' || savedLang === 'en') lang = savedLang;
      const savedTheme = localStorage.getItem('references:theme');
      if (savedTheme === 'light' || savedTheme === 'dark') document.documentElement.setAttribute('data-theme', savedTheme);
    } catch (e) {}
    let filterQuery = '';

    let selected = new Set();
    let sharedMode = false;
    const sharedIds = new Set();

    let activeCategory = null;
    const activePlatforms = new Set();
    const PLATFORMS = [
      { key: 'be', label: 'Behance' },
      { key: 'dr', label: 'Dribbble' },
      { key: 'fg', label: 'Figma' },
      { key: 'pt', label: 'Pinterest' },
    ];
    let presentIndex = 0;
    const presentOrder = [];
    const CATEGORIES = [
      { ru: 'Все', en: 'All', ids: null },
      { ru: 'Брендинг', en: 'Branding', ids: [0, 1, 4, 5] },
      { ru: 'Упаковка', en: 'Packaging', ids: [2, 8] },
      { ru: 'Графика', en: 'Print', ids: [3, 6, 7] },
      { ru: 'Реклама', en: 'Advertising', ids: [9] },
      { ru: 'Цифра', en: 'Digital', ids: [10, 12, 13, 14, 15] },
      { ru: 'Арт', en: 'Art', ids: [11, 16, 17] },
    ];

    function applyFilter() {
      const q = filterQuery;
      document.querySelectorAll('.ref-card, .ref-mini').forEach((card) => {
        const textOk = !q || card.textContent.toLowerCase().includes(q);
        const sharedOk = !sharedMode || sharedIds.has(card.dataset.id);
        const catOk = !activeCategory || activeCategory.has(card.dataset.id);
        let platformOk = activePlatforms.size === 0;
        if (!platformOk) {
          platformOk = (activePlatforms.has('be') && card.dataset.be)
            || (activePlatforms.has('dr') && card.dataset.dr)
            || (activePlatforms.has('fg') && card.dataset.fg)
            || (activePlatforms.has('pt') && card.dataset.pt);
        }
        card.style.display = (textOk && sharedOk && catOk && platformOk) ? '' : 'none';
        // Фильтр по платформе скрывает ссылки невыбранных площадок внутри карточки
        card.querySelectorAll('.ref-card__link').forEach((a) => {
          const cls = [...a.classList].find((c) => c.indexOf('ref-card__link--') === 0);
          const pk = cls ? cls.slice('ref-card__link--'.length) : null;
          const showLink = activePlatforms.size === 0 || (pk && activePlatforms.has(pk));
          a.style.display = showLink ? '' : 'none';
        });
      });
      updateResultCount();
    }

    function renderChips() {
      const bar = document.getElementById('cat-bar');
      bar.innerHTML = '';
      CATEGORIES.forEach((c, i) => {
        const b = document.createElement('button');
        b.type = 'button';
        b.className = 'cat-chip';
        b.textContent = c[lang];
        const isActive = c.ids === null
          ? !activeCategory
          : (activeCategory && activeCategory.size === c.ids.length && c.ids.every(n => activeCategory.has('r' + n)));
        b.setAttribute('aria-pressed', String(isActive));
        b.dataset.cat = String(i);
        bar.appendChild(b);
      });
    }

    function renderPlatformChips() {
      const bar = document.getElementById('platform-bar');
      bar.innerHTML = '';
      PLATFORMS.forEach((p) => {
        const b = document.createElement('button');
        b.type = 'button';
        b.className = 'plat-chip';
        b.textContent = p.label;
        b.setAttribute('aria-pressed', String(activePlatforms.has(p.key)));
        b.dataset.key = p.key;
        bar.appendChild(b);
      });
    }
    function updateResultCount() {
      const n = [...document.querySelectorAll('.ref-card')].filter((c) => c.style.display !== 'none').length;
      const el = document.getElementById('ref-result');
      if (el) el.textContent = (lang === 'ru' ? 'Направлений: ' : 'Directions: ') + n;
    }

    document.getElementById('cat-bar').addEventListener('click', (e) => {
      const b = e.target.closest('.cat-chip');
      if (!b) return;
      const c = CATEGORIES[Number(b.dataset.cat)];
      if (c.ids === null) {
        activeCategory = null;
      } else if (activeCategory && activeCategory.size === c.ids.length && c.ids.every(n => activeCategory.has('r' + n))) {
        activeCategory = null;
      } else {
        activeCategory = new Set(c.ids.map(n => 'r' + n));
      }
      renderChips();
      applyFilter();
    });

    document.getElementById('platform-bar').addEventListener('click', (e) => {
      const b = e.target.closest('.plat-chip');
      if (!b) return;
      const k = b.dataset.key;
      if (activePlatforms.has(k)) activePlatforms.delete(k); else activePlatforms.add(k);
      renderPlatformChips();
      applyFilter();
    });

    function render() {
      document.documentElement.lang = lang;

      document.getElementById('refs-label').textContent = refsI18n[lang]['refs.label'];
      document.getElementById('refs-subtitle').textContent = refsI18n[lang]['refs.subtitle'];
      document.getElementById('special-title').textContent = refsI18n[lang]['refs.specialTitle'];
      document.getElementById('special-desc').textContent = refsI18n[lang]['refs.specialDesc'];
      document.getElementById('boards-title').textContent = refsI18n[lang]['refs.boardsTitle'];
      document.getElementById('boards-desc').textContent = refsI18n[lang]['refs.boardsDesc'];

      // Пересобираем сетки с нуля при смене языка
      document.getElementById('references-grid').innerHTML = '';
      document.getElementById('special-grid').innerHTML = '';
      document.getElementById('boards-grid').innerHTML = '';

      buildReferences();
      buildResourceSection('special-grid', specialResources);
      buildResourceSection('boards-grid', boardResources);

      document.getElementById('lang-ru').setAttribute('aria-pressed', String(lang === 'ru'));
      document.getElementById('lang-en').setAttribute('aria-pressed', String(lang === 'en'));

      syncSelectionClasses();
      renderChips();
      renderPlatformChips();
      applyFilter();
    }

    function setLang(next) {
      lang = next;
      try { localStorage.setItem('references:lang', next); } catch (e) {}
      render();
    }

    function toggleTheme() {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'light' ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', next);
      try { localStorage.setItem('references:theme', next); } catch (e) {}
    }

    document.getElementById('ref-filter').addEventListener('input', (e) => {
      filterQuery = e.target.value.trim().toLowerCase();
      applyFilter();
    });

    render();

    // --- Шеринг-подборка: выбрать направления → одна ссылка ?sel= ---
    function syncSelectionClasses() {
      document.querySelectorAll('.ref-card').forEach((c) => {
        const on = selected.has(c.dataset.id);
        c.classList.toggle('is-selected', on);
        const btn = c.querySelector('.ref-card__select');
        if (btn) {
          btn.setAttribute('aria-pressed', String(on));
          btn.querySelector('.ref-card__select-star').textContent = on ? '★' : '☆';
        }
      });
    }
    function updateShareBar() {
      const bar = document.getElementById('share-bar');
      if (sharedMode || selected.size === 0) { bar.hidden = true; return; }
      bar.hidden = false;
      document.getElementById('share-count').textContent = 'Выбрано: ' + selected.size;
    }
    function saveFav() {
      try { localStorage.setItem('references:fav', JSON.stringify([...selected])); } catch (e) {}
    }

    /* === Режим презентации (Б) === */
    function presentGo(i) {
      if (presentOrder.length === 0) return;
      const idx = Math.max(0, Math.min(presentOrder.length - 1, i));
      presentIndex = idx;
      presentRender();
    }
    function presentRender() {
      const data = refsData[lang] || refsData.en;
      const id = presentOrder[presentIndex];
      const r = data[parseInt(id.slice(1), 10)];
      const stage = document.getElementById('present-stage');
      const links = [
        ['Be', r.behance, 'be'], ['Dr', r.dribbble, 'dr'],
        ['Fg', r.figma, 'fg'], ['Pt', r.pinterest, 'pt'],
      ].filter(([, url]) => url).map(([t, url, c]) =>
        `<a class="present-slide__link--${c}" href="${url}" target="_blank" rel="noopener">${t}</a>`).join('');
      stage.innerHTML = `<div class="present-slide" style="--slide-from:${r.color}33;--slide-to:${r.color}0a">
        <div class="present-slide__inner">
          <div class="present-slide__cat">${r.cat}</div>
          <div class="present-slide__desc">${r.desc}</div>
          <div class="present-slide__links">${links}</div>
        </div>
      </div>`;
      document.getElementById('present-counter').innerHTML = `<b>${presentIndex + 1}</b> / ${presentOrder.length}`;
      document.getElementById('present-prev').disabled = presentIndex === 0;
      document.getElementById('present-next').disabled = presentIndex === presentOrder.length - 1;
    }
    function enterPresentMode() {
      if (selected.size === 0) return;
      presentOrder.length = 0;
      [...selected].forEach((id) => presentOrder.push(id));
      presentIndex = 0;
      const ov = document.getElementById('present-overlay');
      ov.hidden = false;
      document.body.classList.add('present-mode');
      requestAnimationFrame(() => ov.classList.add('is-open'));
      presentRender();
      clearTimeout(enterPresentMode._t);
      enterPresentMode._t = setTimeout(() => ov.classList.add('hide-hint'), 2600);
    }
    function exitPresentMode() {
      const ov = document.getElementById('present-overlay');
      ov.classList.remove('is-open', 'hide-hint');
      document.body.classList.remove('present-mode');
      setTimeout(() => { ov.hidden = true; }, 250);
    }
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.hidden = false;
      clearTimeout(showToast._t);
      showToast._t = setTimeout(() => { t.hidden = true; }, 1800);
    }
    function buildShareUrl() {
      const ids = [...selected].join(',');
      const base = location.origin + location.pathname;
      return ids ? base + '?sel=' + encodeURIComponent(ids) : base;
    }
    function buildSelectionMarkdown() {
      const data = refsData[lang] || refsData.en;
      const lines = ['# Подборка референсов — Справочник дизайнера', ''];
      [...selected].forEach((id) => {
        const i = parseInt(id.slice(1), 10);
        const r = data[i];
        if (!r) return;
        lines.push('### ' + r.cat);
        if (r.behance) lines.push('- Behance: ' + r.behance);
        if (r.dribbble) lines.push('- Dribbble: ' + r.dribbble);
        if (r.figma) lines.push('- Figma: ' + r.figma);
        if (r.pinterest) lines.push('- Pinterest: ' + r.pinterest);
        lines.push('');
      });
      return lines.join('\n').trim() + '\n';
    }
    function enterSharedMode() {
      sharedMode = true;
      document.body.classList.add('shared-mode');
      const banner = document.getElementById('share-banner');
      banner.hidden = false;
      document.getElementById('share-banner-text').textContent = 'Подборка: ' + sharedIds.size + ' направлений';
      applyFilter();
    }
    function exitSharedMode() {
      sharedMode = false;
      sharedIds.clear();
      document.body.classList.remove('shared-mode');
      document.getElementById('share-banner').hidden = true;
      const u = new URL(location.href);
      u.searchParams.delete('sel');
      history.replaceState(null, '', u.pathname + u.search);
      applyFilter();
    }
    document.getElementById('references-grid').addEventListener('click', (e) => {
      const btn = e.target.closest('.ref-card__select');
      if (!btn) return;
      e.preventDefault();
      const card = btn.closest('.ref-card');
      const id = card.dataset.id;
      if (selected.has(id)) selected.delete(id); else selected.add(id);
      syncSelectionClasses();
      updateShareBar();
      saveFav();
    });
    document.getElementById('share-copy').addEventListener('click', async () => {
      const url = buildShareUrl();
      try { await navigator.clipboard.writeText(url); showToast('Ссылка скопирована'); }
      catch { showToast('Скопируй вручную: ' + url); }
    });
    document.getElementById('share-clear').addEventListener('click', () => {
      selected.clear(); syncSelectionClasses(); updateShareBar(); saveFav();
    });
    document.getElementById('share-md').addEventListener('click', async () => {
      const md = buildSelectionMarkdown();
      try { await navigator.clipboard.writeText(md); showToast('Список скопирован'); }
      catch { showToast('Скопируй вручную:\n' + md); }
    });
    document.getElementById('share-present').addEventListener('click', enterPresentMode);
    document.getElementById('present-close').addEventListener('click', exitPresentMode);
    document.getElementById('present-prev').addEventListener('click', () => presentGo(presentIndex - 1));
    document.getElementById('present-next').addEventListener('click', () => presentGo(presentIndex + 1));
    document.addEventListener('keydown', (e) => {
      if (!document.body.classList.contains('present-mode')) return;
      if (e.key === 'Escape') { exitPresentMode(); }
      else if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); presentGo(presentIndex + 1); }
      else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); presentGo(presentIndex - 1); }
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === '/' && !/^(INPUT|TEXTAREA)$/.test(document.activeElement.tagName)) {
        e.preventDefault();
        document.getElementById('ref-filter').focus();
      }
    });
    document.getElementById('share-view-all').addEventListener('click', exitSharedMode);

    // Инициализация: открыли чужую подборку (?sel=) — она важнее
    const _sp = new URLSearchParams(location.search);
    const _sel = _sp.get('sel');
    if (!_sel) {
      try {
        const saved = JSON.parse(localStorage.getItem('references:fav') || '[]');
        if (Array.isArray(saved)) saved.forEach((id) => selected.add(id));
      } catch (e) {}
    }
    if (_sel) {
      _sel.split(',').filter(Boolean).forEach((id) => sharedIds.add(id));
      enterSharedMode();
    }
    syncSelectionClasses();
    updateShareBar();
  </script>
</body>
</html>
